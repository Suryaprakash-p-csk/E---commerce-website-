<!DOCTYPE html>
<html>
<head>
<title>My E-Commerce Store</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
margin:10px 0;
}

button{
background:#ff6a00;
border:none;
color:white;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e85c00;
}

.cart{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>My Online Store</header>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>Laptop</h3>
<p class="price">₹50,000</p>
<button onclick="addToCart('Laptop')">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Smartphone</h3>
<p class="price">₹20,000</p>
<button onclick="addToCart('Smartphone')">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">
<h3>Headphones</h3>
<p class="price">₹3,000</p>
<button onclick="addToCart('Headphones')">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">
<h3>Smart Watch</h3>
<p class="price">₹5,000</p>
<button onclick="addToCart('Smart Watch')">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>Cart Items</h2>
<ul id="cart"></ul>
</div>

<script>

function addToCart(product){

let cart = document.getElementById("cart");

let item = document.createElement("li");

item.textContent = product;

cart.appendChild(item);

}

</script>

</body>
</html>
